<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Java MVP Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
    #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .msg { max-width: 70%; padding: 12px 16px; border-radius: 16px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .user { align-self: flex-end; background: #0070f3; color: #fff; border-bottom-right-radius: 4px; }
    .assistant { align-self: flex-start; background: #fff; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
    .assistant.streaming::after { content: '▋'; animation: blink 0.7s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    #form { display: flex; gap: 8px; padding: 16px 24px; background: #fff; border-top: 1px solid #e0e0e0; }
    #input { flex: 1; padding: 10px 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; outline: none; resize: none; height: 44px; }
    #input:focus { border-color: #0070f3; }
    #send { padding: 10px 20px; background: #0070f3; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    #send:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="chat"></div>
  <form id="form">
    <textarea id="input" placeholder="Type a message… (Enter to send, Shift+Enter for newline)"></textarea>
    <button id="send" type="submit">Send</button>
  </form>

  <script>
    const chat = document.getElementById('chat');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    // Conversation history sent to backend
    const history = [];

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function sendMessage(content) {
      history.push({ role: 'user', content });
      addMessage('user', content);

      const assistantDiv = addMessage('assistant', '');
      assistantDiv.classList.add('streaming');

      sendBtn.disabled = true;
      input.disabled = true;

      let accumulated = '';

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);

        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });
          // SSE lines: "data: <token>\n\n"
          for (const line of chunk.split('\n')) {
            const trimmed = line.trim();
            if (trimmed.startsWith('data:')) {
              const token = trimmed.slice(5); // strip "data:"
              accumulated += token;
              assistantDiv.textContent = accumulated;
              chat.scrollTop = chat.scrollHeight;
            }
          }
        }
      } catch (err) {
        assistantDiv.textContent = `Error: ${err.message}`;
      } finally {
        assistantDiv.classList.remove('streaming');
        history.push({ role: 'assistant', content: accumulated });
        sendBtn.disabled = false;
        input.disabled = false;
        input.focus();
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      input.style.height = '44px';
      sendMessage(text);
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        form.dispatchEvent(new Event('submit'));
      }
    });

    input.addEventListener('input', () => {
      input.style.height = '44px';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });
  </script>
</body>
</html>
