server.port=8080

# Set your OpenRouter API key here or via environment variable OPENROUTER_API_KEY
openrouter.api.key=${OPENROUTER_API_KEY:your-api-key-here}

# Model to use — change to any OpenRouter model slug
openrouter.model=minimax/minimax-m2.5

# Logging — change to INFO to reduce noise once things work
logging.level.com.mvp=DEBUG
